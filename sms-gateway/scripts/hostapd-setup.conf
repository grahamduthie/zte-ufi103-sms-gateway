# hostapd configuration for WiFi setup AP (SMS-Gateway-Setup)
# Used by wifi-ap-start.sh when the gateway falls back to AP mode.
# SSID and password are fixed — this is a setup network, not a security boundary.

interface=wlan0
driver=nl80211
ssid=SMS-Gateway-Setup
channel=6
hw_mode=g
wpa=2
wpa_passphrase=smsgateway
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
ieee80211n=1

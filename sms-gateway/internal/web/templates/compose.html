<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — SMS Gateway</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="icon" href="/static/logo.png">
    <style>
        :root { --max-width: 600px; }
        body { margin: 0; }
        .topbar {
            background: #1a1a2e; color: #fff;
            padding: .5rem 1rem;
            display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar img { height: 48px; border-radius: 8px; }
        .topbar .brand { font-weight: 700; font-size: 1.1rem; }
        .topbar nav { display: flex; gap: .25rem; flex-wrap: wrap; }
        .topbar nav a {
            color: rgba(255,255,255,.75); text-decoration: none;
            padding: .25rem .5rem; border-radius: 4px; font-size: .85rem;
        }
        .topbar nav a:hover, .topbar nav a[aria-current="page"] { color: #fff; background: rgba(255,255,255,.15); }
        main { max-width: var(--max-width); margin: 0 auto; padding: 1rem; }
        @media (max-width: 600px) {
            .topbar { padding: .4rem .6rem; }
            .topbar .brand { display: none; }
            .topbar nav a { padding: .35rem .5rem; font-size: .95rem; }
            .topbar img { height: 40px; }
            main { padding: .75rem .5rem; }
        }
        form label { display: block; margin-bottom: 1rem; }
        form input, form textarea { width: 100%; padding: .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        form textarea { min-height: 100px; resize: vertical; }
        #remaining { font-weight: 600; }
    </style>
</head>
<body>
<header class="topbar">
    <img src="/static/logo.png" alt="Marlow FM">
    <span class="brand">SMS Gateway</span>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/inbox">Received</a>
        <a href="/sent">Sent</a>
        <a href="/conversation">Conversations</a>
        <a href="/compose" aria-current="page">Compose</a>
        <a href="/settings">Settings</a>
    <a href="/logout" style="margin-left:auto;opacity:.7;font-size:.8rem">Logout</a>
    </nav>
</header>
<main>
    <h2>Send SMS</h2>
    <form method="POST" action="/compose">
        <label>Phone Number
            <input type="tel" id="to_number" name="to_number" placeholder="+447700000000"
                   value="{{.PrefillTo}}" required>
        </label>
        <label>Message
            <textarea id="body" name="body" rows="4" maxlength="160" required
                      placeholder="Type your message here..."></textarea>
        </label>
        <p><span id="remaining">160</span> characters remaining</p>
        <button type="submit">Send SMS</button>
    </form>
</main>
<script>
document.getElementById('body').addEventListener('input', function() {
    var remaining = 160 - this.value.length;
    var el = document.getElementById('remaining');
    el.textContent = remaining;
    el.style.color = remaining <= 0 ? 'red' : remaining <= 20 ? 'orange' : '';
    document.querySelector('button[type=submit]').disabled = remaining <= 0;
});
</script>
</body>
</html>

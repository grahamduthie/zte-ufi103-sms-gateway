<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SMS Gateway</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="icon" href="/static/logo.png">
    <style>
        :root { --max-width: 380px; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
        }
        .login-box {
            background: #fff;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: var(--max-width);
            text-align: center;
        }
        .login-box img { height: 64px; border-radius: 10px; margin-bottom: 1rem; }
        .login-box h2 { margin: 0 0 .25rem; font-size: 1.3rem; }
        .login-box p { color: #666; font-size: .9rem; margin: 0 0 1.5rem; }
        .login-box input[type="password"] {
            width: 100%;
            padding: .65rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            text-align: center;
        }
        .login-box button {
            width: 100%;
            padding: .65rem;
            border: none;
            border-radius: 8px;
            background: #0d6efd;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .75rem;
        }
        .login-box button:hover { background: #0b5ed7; }
        .login-box .error { color: #dc3545; font-size: .85rem; margin-top: .75rem; }
    </style>
</head>
<body>
<div class="login-box">
    <img src="/static/logo.png" alt="Marlow FM">
    <h2>SMS Gateway</h2>
    <p>Enter the password to continue</p>
    <form method="POST" action="/login">
        <input type="password" name="password" placeholder="Password" required autofocus>
        <button type="submit">Unlock</button>
    </form>
    {{if .Error}}<div class="error">Incorrect password. Try again.</div>{{end}}
</div>
</body>
</html>
